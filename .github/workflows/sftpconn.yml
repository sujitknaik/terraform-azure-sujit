name: Test SFTP Connection

on:
  workflow_dispatch:

jobs:
  test-sftp:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      - name: Test SFTP Connection
        run: |
          echo "test" > test.txt 
          sftp -i ~/.ssh/id_rsa ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} <<EOF
          put test.txt
          ls
          rm test.txt
          pwd
          exit
          EOF
